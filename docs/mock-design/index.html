<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cmux-style terminal · prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THEME TOKENS
     ------------------------------------------------------------
     Two layers:
       1. App chrome  -> cmux near-black, the "shell" around the terminal
       2. Terminal    -> Ghostty default theme (Catppuccin Frappe),
                         imported verbatim. Swap this block to re-skin
                         every terminal pane at once.
     ============================================================ */
  :root {
    /* --- app chrome (cmux dark) --- */
    --chrome-bg:      #0c0c0e;
    --rail-bg:        #0a0a0c;
    --titlebar-bg:    #131316;
    --panel-bg:       #0e0e11;
    --border:         #1c1c20;
    --border-soft:    #161619;
    --text:           #e6e6ea;
    --text-dim:       #8a8a93;
    --text-faint:     #5b5b63;
    --hover:          #16161a;
    --active:         #1d6ef5;   /* cmux blue selection */
    --active-soft:    #14223f;

    /* --- Ghostty default theme: Catppuccin Frappe --- */
    --g-bg:   #303446;
    --g-fg:   #c6d0f5;
    --g-cursor: #f2d5cf;
    --g-sel:  #626880;
    --g-0:  #51576d;  --g-8:  #626880;   /* black   */
    --g-1:  #e78284;  --g-9:  #e67172;   /* red     */
    --g-2:  #a6d189;  --g-10: #8ec772;   /* green   */
    --g-3:  #e5c890;  --g-11: #d9ba73;   /* yellow  */
    --g-4:  #8caaee;  --g-12: #7b9ef0;   /* blue    */
    --g-5:  #f4b8e4;  --g-13: #f2a4db;   /* magenta */
    --g-6:  #81c8be;  --g-14: #5abfb5;   /* cyan    */
    --g-7:  #a5adce;  --g-15: #b5bfe2;   /* white   */

    --mono: 'JetBrains Mono', 'SF Mono', 'SFMono-Regular', ui-monospace, Menlo, Monaco, 'Cascadia Code', monospace;
    --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

    --rail-w: 252px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #000;
    color: var(--text);
    font-family: var(--ui);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  /* ---- the window ---- */
  .window {
    width: min(1240px, 96vw);
    height: min(800px, 94vh);
    background: var(--chrome-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 40px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.02);
  }

  /* ============================================================
     TITLEBAR
     ============================================================ */
  .titlebar {
    height: 38px;
    flex: 0 0 38px;
    background: var(--titlebar-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    user-select: none;
  }
  .traffic { display: flex; gap: 8px; align-items: center; }
  .light { width: 12px; height: 12px; border-radius: 50%; }
  .light.r { background: #ff5f57; }
  .light.y { background: #febc2e; }
  .light.g { background: #28c840; }

  .icon-btn {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    border: none; background: transparent;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn.on { color: var(--text); }

  .titlebar .title {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 7px;
    margin-left: 2px;
  }
  .titlebar .title .swatch { color: #fab387; }
  .titlebar .spacer { flex: 1; }
  .titlebar .kbd-hint { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); }

  /* ============================================================
     BODY: rail + main
     ============================================================ */
  .body { flex: 1; display: flex; min-height: 0; }

  /* ---- side rail (collapsible) ---- */
  .rail {
    width: var(--rail-w);
    flex: 0 0 var(--rail-w);
    background: var(--rail-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    transition: width .2s cubic-bezier(.4,0,.2,1), flex-basis .2s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .window.rail-collapsed .rail { width: 0; flex-basis: 0; border-right-color: transparent; }

  .rail-head {
    height: 40px; flex: 0 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px 0 14px;
    border-bottom: 1px solid var(--border-soft);
  }
  .rail-head .label {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    color: var(--text-faint); text-transform: uppercase;
  }

  .tree { flex: 1; overflow-y: auto; padding: 6px 6px 14px; }
  .tree::-webkit-scrollbar { width: 8px; }
  .tree::-webkit-scrollbar-thumb { background: #222228; border-radius: 8px; }

  /* project (folder) */
  .project { margin-bottom: 2px; }
  .project-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-radius: 7px;
    cursor: pointer; position: relative;
    color: var(--text-dim);
  }
  .project-row:hover { background: var(--hover); }
  .project-row .chev { width: 12px; transition: transform .15s; color: var(--text-faint); font-size: 10px; }
  .project.collapsed .chev { transform: rotate(-90deg); }
  .project-row .folder { color: var(--text-dim); display: inline-flex; }
  .project-row .pname { font-weight: 600; color: var(--text); font-size: 12.5px; }
  .project-row .ppath { color: var(--text-faint); font-size: 10.5px; font-family: var(--mono); margin-left: auto; }
  .project-row .add-sess {
    opacity: 0; margin-left: 6px; width: 18px; height: 18px;
    display: grid; place-items: center; border-radius: 5px;
    color: var(--text-dim);
  }
  .project-row:hover .add-sess { opacity: 1; }
  .project-row .add-sess:hover { background: #26262c; color: var(--text); }
  .project-row:hover .ppath { display: none; }

  .sessions { padding-left: 8px; margin: 2px 0 6px; }
  .project.collapsed .sessions { display: none; }

  /* session cell (cmux two-line) */
  .session {
    display: flex; gap: 9px; align-items: flex-start;
    padding: 7px 9px; border-radius: 7px; cursor: pointer;
    position: relative; margin-bottom: 1px;
    border: 1px solid transparent;
  }
  .session:hover { background: var(--hover); }
  .session.active { background: var(--active); }
  .session.active .s-name,
  .session.active .s-detail { color: #fff; }
  .session.active .s-detail { opacity: .85; }

  .s-glyph {
    font-family: var(--mono); font-size: 13px; line-height: 18px;
    width: 16px; text-align: center; flex: 0 0 16px;
  }
  .s-main { flex: 1; min-width: 0; }
  .s-name {
    font-size: 12.5px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .s-detail {
    font-size: 10.5px; color: var(--text-faint); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .s-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 7px; margin-top: 6px; }
  .s-dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.45; transform:scale(.7);} }

  .session .s-close {
    position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 5px; display: none;
    place-items: center; color: rgba(255,255,255,.6); font-size: 14px;
  }
  .session:hover .s-close { display: grid; }
  .session .s-close:hover { background: rgba(255,255,255,.15); color: #fff; }
  .session:hover .s-dot { opacity: 0; }

  .add-project-btn {
    margin: 4px 6px 0; padding: 7px 10px; border-radius: 7px;
    display: flex; align-items: center; gap: 8px;
    color: var(--text-faint); cursor: pointer; font-size: 12px;
    border: 1px dashed #232329;
  }
  .add-project-btn:hover { color: var(--text); border-color: #34343c; background: var(--hover); }

  /* ============================================================
     MAIN / TERMINAL
     ============================================================ */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--panel-bg); }

  .sess-head {
    height: 40px; flex: 0 0 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px; background: var(--panel-bg);
  }
  .sess-head .sh-glyph { font-family: var(--mono); font-size: 14px; }
  .sess-head .sh-title { font-weight: 600; font-size: 13px; }
  .sess-head .sh-path { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .sess-head .spacer { flex: 1; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px;
    background: #161619; border: 1px solid var(--border);
  }
  .chip .s-dot { margin: 0; }

  /* terminal pane = Ghostty theme */
  .term {
    flex: 1; min-height: 0; overflow-y: auto;
    background: var(--g-bg); color: var(--g-fg);
    font-family: var(--mono); font-size: 13px; line-height: 1.55;
    padding: 16px 18px;
    white-space: pre-wrap; word-break: break-word;
  }
  .term::-webkit-scrollbar { width: 10px; }
  .term::-webkit-scrollbar-thumb { background: var(--g-sel); border-radius: 10px; }
  .term::selection { background: var(--g-sel); }

  .term .c0{color:var(--g-8)} .term .c1{color:var(--g-1)} .term .c2{color:var(--g-2)}
  .term .c3{color:var(--g-3)} .term .c4{color:var(--g-4)} .term .c5{color:var(--g-5)}
  .term .c6{color:var(--g-6)} .term .c7{color:var(--g-7)}
  .term .dim{color:var(--g-8)} .term .b{font-weight:700}
  .term .orange{color:#fab387} .term .fg{color:var(--g-fg)}

  .cursor {
    display: inline-block; width: 8px; height: 16px;
    background: var(--g-cursor); vertical-align: text-bottom;
    animation: blink 1.1s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .term-input {
    border-top: 1px solid rgba(255,255,255,.05);
    background: var(--g-bg);
    padding: 10px 18px; display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 13px; color: var(--g-fg);
  }
  .term-input .ip { color: var(--g-2); }
  .term-input input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--g-fg); font-family: var(--mono); font-size: 13px;
  }
  .term-input input::placeholder { color: var(--g-8); }

  /* empty state */
  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    color: var(--text-faint); background: var(--panel-bg);
  }
  .empty .big { font-size: 15px; color: var(--text-dim); }
  .empty .pill {
    padding: 8px 16px; border-radius: 8px; background: var(--active);
    color: #fff; font-weight: 600; cursor: pointer; font-size: 12.5px;
  }
  .empty .pill:hover { filter: brightness(1.08); }
  .empty .ghost-art { font-family: var(--mono); color: #2a2a30; font-size: 12px; white-space: pre; line-height: 1.2; }

  /* ============================================================
     AGENT PICKER (Orca-style "pre-open by agent")
     ============================================================ */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40; display: none; }
  .scrim.open { display: block; }

  .picker {
    position: fixed; z-index: 50; width: 286px;
    background: #141417; border: 1px solid #2a2a30; border-radius: 11px;
    box-shadow: 0 24px 60px rgba(0,0,0,.55);
    padding: 6px; display: none;
  }
  .picker.open { display: block; }
  .picker .ph {
    font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--text-faint); padding: 8px 10px 6px;
  }
  .agent {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 10px; border-radius: 8px; cursor: pointer;
  }
  .agent:hover { background: var(--hover); }
  .agent .ag-glyph {
    width: 30px; height: 30px; flex: 0 0 30px; border-radius: 8px;
    display: grid; place-items: center; font-family: var(--mono);
    font-size: 15px; font-weight: 700;
    background: #1d1d22;
  }
  .agent .ag-name { font-weight: 600; font-size: 13px; }
  .agent .ag-sub { font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }

  /* add-project modal */
  .modal {
    position: fixed; z-index: 50; left: 50%; top: 38%;
    translate: -50% -50%;
    width: 360px; background: #141417; border: 1px solid #2a2a30;
    border-radius: 12px; box-shadow: 0 24px 60px rgba(0,0,0,.55);
    padding: 18px; display: none;
  }
  .modal.open { display: block; }
  .modal h3 { font-size: 14px; margin-bottom: 14px; }
  .modal label { display: block; font-size: 11px; color: var(--text-dim); margin: 10px 0 5px; }
  .modal input {
    width: 100%; background: #0d0d10; border: 1px solid #2a2a30;
    border-radius: 7px; padding: 8px 10px; color: var(--text);
    font-family: var(--mono); font-size: 12.5px; outline: none;
  }
  .modal input:focus { border-color: var(--active); }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .modal button {
    padding: 8px 14px; border-radius: 7px; border: 1px solid #2a2a30;
    background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12.5px;
  }
  .modal button.primary { background: var(--active); color: #fff; border-color: var(--active); font-weight: 600; }
  .modal button:hover { filter: brightness(1.1); }

  /* statusbar */
  .statusbar {
    height: 26px; flex: 0 0 26px; border-top: 1px solid var(--border);
    background: var(--titlebar-bg); display: flex; align-items: center;
    padding: 0 12px; gap: 14px; font-family: var(--mono);
    font-size: 10.5px; color: var(--text-faint);
  }
  .statusbar .sb-accent { color: #fab387; }
  .statusbar .spacer { flex: 1; }
</style>
</head>
<body>
  <div class="window" id="window">
    <!-- TITLEBAR -->
    <div class="titlebar">
      <div class="traffic">
        <span class="light r"></span><span class="light y"></span><span class="light g"></span>
      </div>
      <button class="icon-btn on" id="toggleRail" title="Toggle side rail  (Cmd+B)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/>
        </svg>
      </button>
      <div class="title"><span class="swatch">&#10037;</span> cmux</div>
      <div class="spacer"></div>
      <span class="kbd-hint">Cmd+B rail &middot; Cmd+N session</span>
    </div>

    <!-- BODY -->
    <div class="body">
      <!-- SIDE RAIL -->
      <aside class="rail">
        <div class="rail-head">
          <span class="label">Projects</span>
          <button class="icon-btn" id="addProject" title="Add project">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="tree" id="tree"></div>
        <div class="add-project-btn" id="addProject2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add project
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main" id="main"></main>
    </div>

    <!-- STATUSBAR -->
    <div class="statusbar">
      <span class="sb-accent">&#10037; cmux</span>
      <span id="sbInfo">ready</span>
      <span class="spacer"></span>
      <span>ghostty: catppuccin-frappe</span>
      <span id="sbCount"></span>
    </div>
  </div>

  <!-- agent picker -->
  <div class="scrim" id="scrim"></div>
  <div class="picker" id="picker">
    <div class="ph">Pre-open a session with&hellip;</div>
    <div id="agentList"></div>
  </div>

  <!-- add project modal -->
  <div class="modal" id="modal">
    <h3>Add project</h3>
    <label>Name</label>
    <input id="mName" placeholder="my-project" autocomplete="off" />
    <label>Path</label>
    <input id="mPath" placeholder="~/code/my-project" autocomplete="off" />
    <div class="row">
      <button id="mCancel">Cancel</button>
      <button class="primary" id="mAdd">Add</button>
    </div>
  </div>

<script>
/* ============================================================
   AGENT DEFINITIONS  (Orca roster -> "pre-open a session by agent")
   ============================================================ */
const AGENTS = {
  claude:   { name: 'Claude Code',  glyph: '✳', color: '#fab387', sub: 'Anthropic · Opus 4.8' },
  codex:    { name: 'Codex',        glyph: '⬡', color: '#a6d189', sub: 'OpenAI · gpt-5' },
  cursor:   { name: 'Cursor Agent', glyph: '▸', color: '#8caaee', sub: 'Cursor CLI' },
  gemini:   { name: 'Gemini',       glyph: '✦', color: '#f2a4db', sub: 'Google · 2.5 Pro' },
  copilot:  { name: 'Copilot',      glyph: '◐', color: '#81c8be', sub: 'GitHub' },
  opencode: { name: 'OpenCode',     glyph: '◇', color: '#e5c890', sub: 'open source' },
  shell:    { name: 'Shell',        glyph: '>_',     color: '#a5adce', sub: 'zsh' },
};

/* ============================================================
   |---------------------------------------------------------|
   |  YOUR DESIGN DECISION -- session status treatment        |
   |---------------------------------------------------------|
   |  Orca/cmux surface agent state in the rail: is this      |
   |  session working, waiting on me, idle, or done?          |
   |  How those map to colour + label + motion is the one     |
   |  genuinely subjective UX call in this prototype.         |
   |                                                          |
   |  A sensible default is implemented below. Tune the hex,  |
   |  labels, and `pulse` (animated dot) to taste -- e.g.     |
   |  make "waiting" the loudest state since it needs you,    |
   |  and keep "working" calm so a busy rail does not feel    |
   |  like an emergency.                                      |
   |---------------------------------------------------------|
   ============================================================ */
function statusMeta(status) {
  switch (status) {
    case 'working': return { label: 'Working',     color: '#a6d189', pulse: true  };
    case 'waiting': return { label: 'Needs input', color: '#e5c890', pulse: true  };
    case 'done':    return { label: 'Done',        color: '#8caaee', pulse: false };
    case 'idle':
    default:        return { label: 'Idle',        color: '#5b5b63', pulse: false };
  }
}

/* ============================================================
   STATE  (persisted to localStorage)
   ============================================================ */
let uid = 1;
const nid = () => 's' + (uid++);

function seed() {
  return {
    sidebarOpen: true,
    activeId: null,
    projects: [
      { id: 'p1', name: 'minecraft-replica', path: '~/minecraft-replica', collapsed: false, sessions: [
        { id: nid(), name: 'Claude Code', agent: 'claude', status: 'working', detail: 'Editing terrain.js · esc to interrupt' },
        { id: nid(), name: 'dev server',  agent: 'shell',  status: 'idle',    detail: 'localhost:3001' },
      ]},
      { id: 'p2', name: 'FluidVoice', path: '~/FluidVoice', collapsed: false, sessions: [
        { id: nid(), name: 'Codex', agent: 'codex', status: 'waiting', detail: 'Apply patch to AudioEngine.swift?' },
      ]},
      { id: 'p3', name: 'even-termius-manager', path: '~/even-termius', collapsed: false, sessions: [
        { id: nid(), name: 'Gemini', agent: 'gemini', status: 'done', detail: 'Turn complete in 59s' },
      ]},
    ],
  };
}

let state = load() || seed();
state.activeId = state.activeId || (state.projects[0] && state.projects[0].sessions[0] && state.projects[0].sessions[0].id) || null;

function save() {
  try { localStorage.setItem('cmux-proto', JSON.stringify(Object.assign({}, state, { _uid: uid }))); } catch (e) {}
}
function load() {
  try {
    const raw = localStorage.getItem('cmux-proto');
    if (!raw) return null;
    const d = JSON.parse(raw);
    uid = d._uid || 50;
    return d;
  } catch (e) { return null; }
}

/* ============================================================
   HELPERS
   ============================================================ */
const $  = (s, r) => (r || document).querySelector(s);
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };

function findSession(id) {
  for (const p of state.projects) {
    const s = p.sessions.find(x => x.id === id);
    if (s) return { project: p, session: s };
  }
  return null;
}

/* ============================================================
   RENDER: side rail tree
   ============================================================ */
function renderTree() {
  const tree = $('#tree');
  tree.innerHTML = '';

  state.projects.forEach(p => {
    const proj = el('div', 'project' + (p.collapsed ? ' collapsed' : ''));

    const row = el('div', 'project-row');
    row.innerHTML =
      '<span class="chev">&#9662;</span>' +
      '<span class="folder">' + (p.collapsed ? folderIcon() : folderOpenIcon()) + '</span>' +
      '<span class="pname">' + escapeHtml(p.name) + '</span>' +
      '<span class="ppath">' + escapeHtml(p.path) + '</span>';
    const add = el('span', 'add-sess', plusIcon());
    add.title = 'Pre-open a session...';
    add.onclick = (e) => { e.stopPropagation(); openPicker(p.id, e.currentTarget); };
    row.appendChild(add);
    row.onclick = () => { p.collapsed = !p.collapsed; save(); renderTree(); };
    proj.appendChild(row);

    const sessions = el('div', 'sessions');
    p.sessions.forEach(s => sessions.appendChild(renderSession(p, s)));
    proj.appendChild(sessions);

    tree.appendChild(proj);
  });

  const count = state.projects.reduce((n, p) => n + p.sessions.length, 0);
  $('#sbCount').textContent = state.projects.length + ' projects · ' + count + ' sessions';
}

function renderSession(p, s) {
  const a = AGENTS[s.agent] || AGENTS.shell;
  const m = statusMeta(s.status);
  const node = el('div', 'session' + (s.id === state.activeId ? ' active' : ''));
  node.innerHTML =
    '<span class="s-glyph" style="color:' + a.color + '">' + a.glyph + '</span>' +
    '<span class="s-main">' +
      '<span class="s-name">' + escapeHtml(s.name) + '</span>' +
      '<span class="s-detail">' + escapeHtml(s.detail || m.label) + '</span>' +
    '</span>' +
    '<span class="s-dot ' + (m.pulse ? 'pulse' : '') + '" style="background:' + m.color + '" title="' + m.label + '"></span>' +
    '<span class="s-close" title="Close session">&times;</span>';
  node.onclick = (e) => {
    if (e.target.classList.contains('s-close')) { closeSession(p, s); return; }
    state.activeId = s.id; save(); render();
  };
  return node;
}

/* ============================================================
   RENDER: main terminal pane (no tabs -- single active session)
   ============================================================ */
function renderMain() {
  const main = $('#main');
  main.innerHTML = '';
  const found = state.activeId && findSession(state.activeId);

  if (!found) {
    main.appendChild(renderEmpty());
    $('#sbInfo').textContent = 'no active session';
    return;
  }

  const project = found.project, session = found.session;
  const a = AGENTS[session.agent] || AGENTS.shell;
  const m = statusMeta(session.status);

  const head = el('div', 'sess-head');
  head.innerHTML =
    '<span class="sh-glyph" style="color:' + a.color + '">' + a.glyph + '</span>' +
    '<span class="sh-title">' + escapeHtml(session.name) + '</span>' +
    '<span class="sh-path">' + escapeHtml(project.path) + '</span>' +
    '<span class="spacer"></span>' +
    '<span class="chip"><span class="s-dot ' + (m.pulse ? 'pulse' : '') + '" style="background:' + m.color + '"></span>' + m.label + '</span>';
  main.appendChild(head);

  const term = el('div', 'term');
  term.innerHTML = banner(session, project);
  main.appendChild(term);

  const input = el('div', 'term-input');
  input.innerHTML = '<span class="ip">' + a.glyph + '</span>';
  const field = el('input');
  field.placeholder = session.agent === 'shell' ? 'type a command...' : ('message ' + a.name + '...');
  field.onkeydown = (e) => {
    if (e.key === 'Enter' && field.value.trim()) {
      appendLine(term, field.value.trim());
      field.value = '';
      session.status = 'working';
      session.detail = 'Working · esc to interrupt';
      save(); renderTree();
      head.querySelector('.chip').innerHTML =
        '<span class="s-dot pulse" style="background:' + statusMeta('working').color + '"></span>Working';
    }
  };
  input.appendChild(field);
  main.appendChild(input);

  $('#sbInfo').textContent = project.name + ' > ' + session.name;
}

function renderEmpty() {
  const e = el('div', 'empty');
  e.innerHTML =
    '<div class="ghost-art">  .-----.\n ( o   o )\n (   ^   )\n  \"\"\"\"\"\"\"</div>' +
    '<div class="big">No session open</div>' +
    '<div>Pick a project in the rail and pre-open an agent.</div>';
  const pill = el('div', 'pill', '+ New session');
  pill.onclick = (ev) => {
    const p = state.projects[0];
    if (p) openPicker(p.id, ev.currentTarget);
  };
  e.appendChild(pill);
  return e;
}

/* ============================================================
   FAUX TERMINAL BANNERS (Ghostty-styled per agent)
   ============================================================ */
function banner(s, p) {
  const path = '<span class="dim">' + escapeHtml(p.path) + '</span>';
  if (s.agent === 'claude') {
    return '<span class="orange b">✳ Claude Code</span> <span class="dim">v2.1.195</span>\n' +
      '<span class="dim">  Opus 4.8 (1M context) with xhigh effort · Claude Max</span>\n' +
      '  ' + path + '\n\n' +
      '<span class="c2">  Tips for getting started:</span>\n' +
      '<span class="dim">  - Run</span> <span class="c4">/init</span> <span class="dim">to create a CLAUDE.md</span>\n' +
      '<span class="dim">  - Use</span> <span class="c4">@</span> <span class="dim">to reference files, /agents to spawn subagents</span>\n\n' +
      '<span class="c3">*</span> I have finished mapping the terrain generator. ' + detailLine(s) + '\n' +
      '<span class="orange">&rsaquo;</span> <span class="cursor"></span>';
  }
  if (s.agent === 'codex') {
    return '<span class="c2 b">⬡ OpenAI Codex</span> <span class="dim">v0.136.0</span>\n' +
      '<span class="dim">  gpt-5 · medium reasoning</span>\n' +
      '  ' + path + '\n\n' +
      '<span class="c3">&rsaquo;</span> apply patch to <span class="c4">AudioEngine.swift</span>?\n' +
      '<span class="dim">  +-- proposed change ---------------</span>\n' +
      '<span class="c1">  - prewarmDelay = 0.4</span>\n' +
      '<span class="c2">  + prewarmDelay = 0.0  // hot-mic</span>\n' +
      '<span class="dim">  +---------------------------------</span>\n' +
      '<span class="c3">  [y] apply   [n] skip   [e] edit</span>\n' +
      '<span class="c2">&rsaquo;</span> <span class="cursor"></span>';
  }
  if (s.agent === 'gemini') {
    return '<span class="c5 b">✦ Gemini CLI</span>\n' +
      '<span class="dim">  gemini-2.5-pro</span>\n' +
      '  ' + path + '\n\n' +
      '<span class="c6">✓</span> Refactored the SSH session manager into a service.\n' +
      '<span class="dim">  3 files changed · 84 insertions · 21 deletions</span>\n' +
      '<span class="c4">  Turn complete in 59s.</span>\n' +
      '<span class="c5">&rsaquo;</span> <span class="cursor"></span>';
  }
  // shell + others
  return '<span class="c2">' + escapeHtml(p.path.replace('~','')) + '</span> <span class="dim">on</span> <span class="c5">main</span>\n' +
    '<span class="c2 b">' + escapeHtml(p.path) + '</span> <span class="c4">%</span> <span class="cursor"></span>';
}

function detailLine(s) {
  return '<span class="dim">(' + escapeHtml(s.detail || '') + ')</span>';
}

function appendLine(term, text) {
  const cur = term.querySelector('.cursor');
  if (cur) cur.remove();
  term.insertAdjacentHTML('beforeend',
    '\n<span class="orange">&rsaquo;</span> ' + escapeHtml(text) +
    '\n<span class="c3">*</span> <span class="dim">thinking...</span> <span class="cursor"></span>');
  term.scrollTop = term.scrollHeight;
}

/* ============================================================
   ACTIONS: add project / session, picker, toggle rail
   ============================================================ */
function openPicker(projectId, anchor) {
  const picker = $('#picker'), scrim = $('#scrim'), list = $('#agentList');
  list.innerHTML = '';
  Object.keys(AGENTS).forEach(key => {
    const a = AGENTS[key];
    const item = el('div', 'agent');
    item.innerHTML =
      '<span class="ag-glyph" style="color:' + a.color + '">' + a.glyph + '</span>' +
      '<span><div class="ag-name">' + a.name + '</div><div class="ag-sub">' + a.sub + '</div></span>';
    item.onclick = () => { createSession(projectId, key); closePicker(); };
    list.appendChild(item);
  });

  const r = anchor.getBoundingClientRect();
  picker.style.left = Math.min(r.left, window.innerWidth - 300) + 'px';
  picker.style.top  = Math.min(r.bottom + 6, window.innerHeight - 380) + 'px';
  picker.classList.add('open');
  scrim.classList.add('open');
}
function closePicker() { $('#picker').classList.remove('open'); $('#scrim').classList.remove('open'); }

function createSession(projectId, agentKey) {
  const p = state.projects.find(x => x.id === projectId);
  if (!p) return;
  const a = AGENTS[agentKey];
  const s = {
    id: nid(), name: a.name, agent: agentKey,
    status: agentKey === 'shell' ? 'idle' : 'working',
    detail: agentKey === 'shell' ? 'zsh' : 'Starting up...',
  };
  p.sessions.push(s);
  p.collapsed = false;
  state.activeId = s.id;
  save(); render();
}

function closeSession(p, s) {
  p.sessions = p.sessions.filter(x => x.id !== s.id);
  if (state.activeId === s.id) {
    const all = state.projects.reduce((acc, pr) => acc.concat(pr.sessions), []);
    state.activeId = (all[0] && all[0].id) || null;
  }
  save(); render();
}

function toggleRail(force) {
  state.sidebarOpen = force != null ? force : !state.sidebarOpen;
  $('#window').classList.toggle('rail-collapsed', !state.sidebarOpen);
  $('#toggleRail').classList.toggle('on', state.sidebarOpen);
  save();
}

/* add-project modal */
function openModal() {
  $('#modal').classList.add('open');
  $('#scrim').classList.add('open');
  $('#mName').value = ''; $('#mPath').value = '';
  setTimeout(() => $('#mName').focus(), 0);
}
function closeModal() { $('#modal').classList.remove('open'); $('#scrim').classList.remove('open'); }
function addProjectFromModal() {
  const name = $('#mName').value.trim() || 'untitled';
  const path = $('#mPath').value.trim() || ('~/' + name);
  state.projects.push({ id: 'p' + nid(), name: name, path: path, collapsed: false, sessions: [] });
  save(); renderTree(); closeModal();
}

/* ============================================================
   ICONS / utils
   ============================================================ */
function folderIcon()     { return svg('<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'); }
function folderOpenIcon() { return svg('<path d="M3 16l2.5-7H22l-2.4 7a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2"/>'); }
function plusIcon()       { return svg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'); }
function svg(inner)       { return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">' + inner + '</svg>'; }
function escapeHtml(s)    { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============================================================
   WIRE UP
   ============================================================ */
function render() { renderTree(); renderMain(); }

$('#toggleRail').onclick = () => toggleRail();
$('#addProject').onclick = openModal;
$('#addProject2').onclick = openModal;
$('#scrim').onclick = () => { closePicker(); closeModal(); };
$('#mCancel').onclick = closeModal;
$('#mAdd').onclick = addProjectFromModal;
$('#mPath').onkeydown = (e) => { if (e.key === 'Enter') addProjectFromModal(); };
$('#mName').onkeydown = (e) => { if (e.key === 'Enter') $('#mPath').focus(); };

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'b') { e.preventDefault(); toggleRail(); }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n') {
    e.preventDefault();
    const found = state.activeId && findSession(state.activeId);
    const p = found ? found.project : state.projects[0];
    if (p) openPicker(p.id, $('#addProject'));
  }
  if (e.key === 'Escape') { closePicker(); closeModal(); }
});

toggleRail(state.sidebarOpen);
render();
</script>
</body>
