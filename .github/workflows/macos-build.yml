name: macOS build

# Compiles the native app on a real macOS runner — the only place a Swift +
# AppKit + libghostty app can be built — mirroring how cmux builds in CI:
# build GhosttyKit.xcframework from Ghostty (Zig), then swift build / swift test.

# Run once per change: PR branches build via `pull_request`; `main` builds via
# `push`. (Triggering on both push:"**" and pull_request double-runs every PR
# commit.)
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: macos-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macOS 26 (Tahoe). The cmux Ghostty fork builds against the macOS 26 SDK:
    # pkg/macos/video/pixel_format.zig references kCVPixelFormatType_30RGB_r210,
    # a CoreVideo enum constant that only exists in the macOS 26 SDK, so Zig's
    # @cImport fails to compile on older runners (macos-14/15). This mirrors the
    # fork's own CI, which builds on Tahoe with Xcode 26.
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      # cmux builds GhosttyKit from its OWN Ghostty fork (see manaflow-ai/cmux
      # .gitmodules), which carries the embedding API and stays buildable —
      # upstream ghostty-org/ghostty@main fights the vendored Highway C++ build.
      GHOSTTY_REPO: https://github.com/manaflow-ai/ghostty
      GHOSTTY_REF: ""   # empty = the fork's default branch; set a commit/tag to pin
      PKG: macos/SacredTerminal
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        # Pin Xcode 26.3. Zig 0.15.2 can't link its host build runner against the
        # libSystem in the macOS SDK shipped by Xcode 26.5 (the macos-26 runner's
        # default) — `zig build` dies with a flood of undefined libc symbols
        # (_abort, _clock_gettime, __availability_version_check, …). Xcode 26.3's
        # SDK works; it's what the cmux Ghostty fork's CI and local dev build with.
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcode-select -p

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Clone Ghostty (cmux fork)
        run: |
          if [ -n "$GHOSTTY_REF" ]; then
            git clone --depth 1 --recurse-submodules --branch "$GHOSTTY_REF" "$GHOSTTY_REPO" vendor/ghostty
          else
            git clone --depth 1 --recurse-submodules "$GHOSTTY_REPO" vendor/ghostty
          fi

      - name: Determine Zig version
        id: zig
        # Ghostty pins its Zig requirement in .zig-version (older) or
        # build.zig.zon's `minimum_zig_version` (current). Read whichever exists.
        run: |
          ver=""
          if [ -f vendor/ghostty/.zig-version ]; then
            ver="$(tr -d '[:space:]' < vendor/ghostty/.zig-version)"
          fi
          if [ -z "$ver" ] && [ -f vendor/ghostty/build.zig.zon ]; then
            ver="$(grep -oE 'minimum_zig_version[[:space:]]*=[[:space:]]*"[^"]+"' vendor/ghostty/build.zig.zon \
                   | grep -oE '"[^"]+"' | tr -d '"' | head -1)"
          fi
          [ -z "$ver" ] && ver="0.15.1"
          echo "Using Zig $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Setup Zig ${{ steps.zig.outputs.version }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig.outputs.version }}

      - name: Build GhosttyKit.xcframework
        working-directory: vendor/ghostty
        # Native target (the runner's arch) — matches cmux's documented dev build
        # and avoids the universal cross-target C++ surface. Add
        # -Dxcframework-target=universal for distributable (Intel+arm64) builds.
        run: zig build -Demit-xcframework=true -Doptimize=ReleaseFast

      - name: Stage GhosttyKit into the package
        run: |
          FW="$(find vendor/ghostty -maxdepth 5 -name 'GhosttyKit.xcframework' -type d | head -1)"
          if [ -z "$FW" ]; then echo "GhosttyKit.xcframework not found after build" >&2; exit 1; fi
          mkdir -p "$PKG/vendor"
          rm -rf "$PKG/vendor/GhosttyKit.xcframework"
          cp -R "$FW" "$PKG/vendor/GhosttyKit.xcframework"
          echo "Staged $FW -> $PKG/vendor/GhosttyKit.xcframework"

      - name: Normalize xcframework library names
        # Ghostty's build.zig names the single-target macOS archive
        # `ghostty-internal.a` (the fat/combined slices get `lib…-fat.a`). SwiftPM's
        # linker rejects static libraries whose names lack a `lib` prefix
        # ("unexpected binary name … Static libraries should be prefixed with lib"),
        # so lib-prefix any such archive and patch the xcframework's Info.plist.
        run: |
          python3 - "$PKG/vendor/GhosttyKit.xcframework" <<'PY'
          import os, sys, plistlib
          xc = sys.argv[1]
          plist_path = os.path.join(xc, "Info.plist")
          with open(plist_path, "rb") as f:
              info = plistlib.load(f)
          changed = False
          for lib in info.get("AvailableLibraries", []):
              ident, name = lib["LibraryIdentifier"], lib["LibraryPath"]
              if name.startswith("lib"):
                  continue
              newname = "lib" + name
              src = os.path.join(xc, ident, name)
              if os.path.exists(src):
                  os.rename(src, os.path.join(xc, ident, newname))
              lib["LibraryPath"] = newname
              if lib.get("BinaryPath") == name:
                  lib["BinaryPath"] = newname
              changed = True
              print(f"renamed {ident}/{name} -> {newname}")
          if changed:
              with open(plist_path, "wb") as f:
                  plistlib.dump(info, f)
              print("patched Info.plist")
          else:
              print("nothing to do (all libraries already lib-prefixed)")
          PY

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: ${{ env.PKG }}/.build
          key: spm-${{ runner.os }}-${{ hashFiles('macos/SacredTerminal/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: swift build
        working-directory: ${{ env.PKG }}
        run: swift build -v

      - name: swift test (if any test targets)
        working-directory: ${{ env.PKG }}
        run: |
          tests="$(swift test --list-tests 2>/dev/null || true)"
          if [ -n "$tests" ]; then
            swift test
          else
            echo "No test targets yet — add a platform-independent SacredCore library + XCTest to enable."
          fi
